name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: images

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Victor-201
          outputs: |
            snake.svg?palette=github-dark&color_snake=39FF14&color_dots=#0d1117,#1a2b1a,#2d5a27,#39FF14,#7fff00
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake.svg to images branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update snake.svg"
          branch: images
          file_pattern: snake.svg
